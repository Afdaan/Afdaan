<svg fill="none" viewBox="0 0 600 160" width="600" height="160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #1a1b26; }
    .bar { fill: #24283b; }
    .red { fill: #f7768e; }
    .yel { fill: #e0af68; }
    .grn { fill: #9ece6a; }
    text { font-family: 'Fira Code','Courier New',monospace; font-size: 13px; }
    .p { fill: #9ece6a; }
    .c { fill: #a9b1d6; }
    .o { fill: #565f89; }
    .e { fill: #f7768e; }
    .cur { fill: #c0caf5; }

    .l1 { opacity:0; animation: a1 16s forwards; }
    .l2 { opacity:0; animation: a2 16s forwards; }
    .l3 { opacity:0; animation: a3 16s forwards; }
    .l4 { opacity:0; animation: a4 16s forwards; }
    .l5 { opacity:0; animation: a5 16s forwards; }
    .l6 { opacity:0; animation: bk 16s forwards; }

    @keyframes a1 { 0%,3%{opacity:0} 4%{opacity:1} 100%{opacity:1} }
    @keyframes a2 { 0%,12%{opacity:0} 13%{opacity:1} 100%{opacity:1} }
    @keyframes a3 { 0%,22%{opacity:0} 23%{opacity:1} 100%{opacity:1} }
    @keyframes a4 { 0%,35%{opacity:0} 36%{opacity:1} 100%{opacity:1} }
    @keyframes a5 { 0%,47%{opacity:0} 48%{opacity:1} 100%{opacity:1} }
    @keyframes bk {
      0%,55%{opacity:0}
      56%{opacity:1} 62%{opacity:0}
      68%{opacity:1} 74%{opacity:0}
      80%{opacity:1} 86%{opacity:0}
      92%{opacity:1} 100%{opacity:1}
    }
  </style>

  <rect class="bg" width="600" height="160" rx="8" />
  <rect class="bar" width="600" height="28" rx="8" />
  <rect class="bar" width="600" height="8" y="22" />
  <circle class="red" cx="16" cy="14" r="6" />
  <circle class="yel" cx="36" cy="14" r="6" />
  <circle class="grn" cx="56" cy="14" r="6" />
  <text x="270" y="18" fill="#565f89" font-size="11" text-anchor="middle">afdaan@infra: ~</text>

  <g class="l1">
    <text class="p" x="15" y="52">afdaan@infra:~$</text>
    <text class="c" x="155" y="52">kubectl get pods</text>
  </g>
  <g class="l2">
    <text class="o" x="15" y="70">NAME          READY   STATUS    AGE</text>
  </g>
  <g class="l3">
    <text class="p" x="15" y="88">web-app-v1    1/1     Running   12h</text>
  </g>
  <g class="l4">
    <text class="p" x="15" y="111">afdaan@infra:~$</text>
    <text class="c" x="155" y="111">sudo rm -rf / --no-preserve-root</text>
  </g>
  <g class="l5">
    <text class="e" x="15" y="129">rm: Permission denied (nice try lol)</text>
  </g>
  <g class="l6">
    <text class="p" x="15" y="150">afdaan@infra:~$</text>
    <rect class="cur" x="155" y="139" width="8" height="13" />
  </g>
</svg>
